<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento concluído — ToS &amp; Privacy Summarizer</title>
    <style>
        :root { --green:#2e7d5b; --green-d:#1f5c42; --bg:#f4f8f5; --ink:#1b2b22; --muted:#5d6f65; }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #eaf3ee 0%, #f4f8f5 100%); color: var(--ink); padding: 24px;
        }
        .card {
            background: #fff; border: 1px solid #e0eae4; border-radius: 20px; max-width: 440px; width: 100%;
            padding: 40px 32px; text-align: center; box-shadow: 0 12px 40px rgba(31,92,66,.10);
        }
        .badge {
            width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center;
            justify-content: center; background: #e3f3ea; color: var(--green); font-size: 38px;
        }
        h1 { font-size: 22px; margin: 0 0 8px; }
        p { color: var(--muted); margin: 6px 0; line-height: 1.5; font-size: 15px; }
        .balance {
            margin: 24px 0; padding: 18px; background: var(--bg); border-radius: 14px; border: 1px solid #e0eae4;
        }
        .balance .num { font-size: 34px; font-weight: 700; color: var(--green-d); }
        .balance .lbl { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
        .hint { font-size: 13px; color: var(--muted); margin-top: 20px; }
        .spinner {
            width: 34px; height: 34px; border: 3px solid #d6e6dd; border-top-color: var(--green);
            border-radius: 50%; margin: 8px auto; animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .err { color: #b3261e; }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="badge" id="icon"><div class="spinner"></div></div>
        <h1 id="title">A confirmar o pagamento…</h1>
        <p id="msg">Aguarde um momento enquanto validamos a sua compra.</p>
        <div class="balance" id="balanceBox" style="display:none">
            <div class="num" id="balanceNum">—</div>
            <div class="lbl">créditos disponíveis</div>
        </div>
        <p class="hint" id="hint" style="display:none">
            Pode fechar este separador. Os créditos já estão na sua conta — abra a extensão para os ver.
        </p>
    </div>

    <script>
        (function () {
            var API = 'https://tos-privacy-summarizer.vercel.app/api/stripe/confirm';
            var params = new URLSearchParams(window.location.search);
            var sessionId = params.get('session_id');
            var icon = document.getElementById('icon');
            var title = document.getElementById('title');
            var msg = document.getElementById('msg');
            var balanceBox = document.getElementById('balanceBox');
            var balanceNum = document.getElementById('balanceNum');
            var hint = document.getElementById('hint');

            function ok(data) {
                icon.textContent = '✓';
                title.textContent = data.alreadyProcessed ? 'Pagamento confirmado' : 'Pagamento concluído!';
                msg.textContent = (data.credits ? (data.credits + ' créditos foram adicionados') : 'Compra confirmada') +
                    (data.package ? ' (' + data.package + ').' : '.');
                if (typeof data.newBalance === 'number') {
                    balanceNum.textContent = data.newBalance;
                    balanceBox.style.display = 'block';
                }
                hint.style.display = 'block';
            }

            function fail(text) {
                icon.textContent = '!';
                icon.classList.add('err');
                title.textContent = 'Não foi possível confirmar';
                title.classList.add('err');
                msg.textContent = text || 'Tente recarregar esta página. Se o problema persistir, contacte o suporte com o ID da sessão.';
                hint.textContent = sessionId ? ('ID da sessão: ' + sessionId) : '';
                hint.style.display = 'block';
            }

            if (!sessionId) { fail('Sessão de pagamento em falta no endereço.'); return; }

            fetch(API + '?session_id=' + encodeURIComponent(sessionId))
                .then(function (r) { return r.json().then(function (j) { return { okHttp: r.ok, body: j }; }); })
                .then(function (res) {
                    if (res.okHttp && res.body && res.body.success) ok(res.body);
                    else fail(res.body && res.body.error);
                })
                .catch(function () { fail('Erro de rede ao confirmar o pagamento.'); });
        })();
    </script>
</body>
</html>
