<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento cancelado — ToS &amp; Privacy Summarizer</title>
    <style>
        :root { --green:#2e7d5b; --ink:#1b2b22; --muted:#5d6f65; }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #eaf3ee 0%, #f4f8f5 100%); color: var(--ink); padding: 24px;
        }
        .card {
            background: #fff; border: 1px solid #e0eae4; border-radius: 20px; max-width: 440px; width: 100%;
            padding: 40px 32px; text-align: center; box-shadow: 0 12px 40px rgba(31,92,66,.10);
        }
        .badge {
            width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center;
            justify-content: center; background: #fbe7e6; color: #b3261e; font-size: 38px;
        }
        h1 { font-size: 22px; margin: 0 0 8px; }
        p { color: var(--muted); margin: 6px 0; line-height: 1.5; font-size: 15px; }
        .hint { font-size: 13px; color: var(--muted); margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">×</div>
        <h1>Pagamento cancelado</h1>
        <p>Não foi cobrado nada. A sua compra de créditos não foi concluída.</p>
        <p class="hint">Pode fechar este separador e tentar novamente a partir da extensão quando quiser.</p>
    </div>
</body>
</html>
